---
# Test Case 1: CPU Spike Injection
# This test injects high CPU load into the API service to test
# anomaly detection and monitoring capabilities

apiVersion: v1
kind: Pod
metadata:
  name: cpu-stress-test
  namespace: edge-ai-monitor
  labels:
    app: cpu-stress-test
    test-type: fault-injection
spec:
  containers:
  - name: cpu-stress
    image: polinux/stress
    command: ["stress"]
    args: ["--cpu", "4", "--timeout", "120s", "--verbose"]
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "2000m"
        memory: "512Mi"
  restartPolicy: Never
---
# Deployment with high CPU consumption
apiVersion: apps/v1
kind: Deployment
metadata:
  name: high-cpu-workload
  namespace: edge-ai-monitor
  labels:
    app: high-cpu-workload
    test-type: fault-injection
spec:
  replicas: 2
  selector:
    matchLabels:
      app: high-cpu-workload
  template:
    metadata:
      labels:
        app: high-cpu-workload
        test-type: fault-injection
    spec:
      containers:
      - name: cpu-intensive
        image: python:3.9-slim
        command: ["python", "-c"]
        args:
        - |
          import time
          import math
          import random
          print("Starting CPU intensive workload...")
          for i in range(1000000):
              # CPU intensive calculations
              result = sum(math.sqrt(random.random() * 1000) for _ in range(1000))
              if i % 10000 == 0:
                  print(f"Iteration {i}, result: {result}")
          print("CPU workload completed")
        resources:
          requests:
            cpu: "500m"
            memory: "256Mi"
          limits:
            cpu: "2000m"
            memory: "512Mi"
  # Auto-cleanup after test
  ttlSecondsAfterFinished: 300
