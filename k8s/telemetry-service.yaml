apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-generator
  namespace: edge-ai-monitor
  labels:
    app: telemetry-generator
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry-generator
  template:
    metadata:
      labels:
        app: telemetry-generator
        component: monitoring
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: telemetry-generator
        image: edge-ai-monitor/telemetry-generator:latest
        ports:
        - containerPort: 8001
          name: http
        env:
        - name: LOG_LEVEL
          value: "INFO"
        - name: GENERATION_INTERVAL
          value: "10"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-generator
  namespace: edge-ai-monitor
  labels:
    app: telemetry-generator
    component: monitoring
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8001"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: telemetry-generator
  ports:
  - name: http
    port: 8001
    targetPort: 8001
    protocol: TCP
  type: ClusterIP
